<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="author" content="Douglas Crockford" />
<title>The Misty Parse Demo</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" type="text/css" href="../misty.css">
<style>
input[type=button] {
    border: 2pt solid black;
    border-radius: 2em;
    font-family: Programma, monospace;
    font-size: 100%;
    margin: 0.5em;
    padding: 0.5em;
}
input[type=button]:hover {
    background-color: thistle;
}
textarea {
    width:100%;
}
</style>
</head>
<body>
<img src="../misty.gif" width="204" height="79">
<h1><a href="https://mistysystem.com/">Misty Programming Language:</a>The Misty Parse Demo</h1>
<p>Put misty source text in the box and push a button.</p>
<fieldset style="clear: both;">
<legend>Source text</legend>
<textarea
    autocomplete=off
    autocorrect=off
    autofocus=on
    id="inputation"
    placeholder="misty program..."
    rows=24
    spellcheck=false
    wrap=off
>
</textarea>
</fieldset>
<p style="text-align: center;">

<input id=clear type=button value="clear">
<input id=tokens type=button value="tokens">
<input id=compile type=button value="compile">
<input id=complete type=button value="complete">
<input id=scope type=button value="scope">
<input id=intrin type=button value="intrinsics">
<input id=debugger type=button value="debugger">

</p>
<fieldset><legend id=outputlegend>Watch this space</legend>
<pre id=outputation style="clear: both;"></pre></fieldset>

<script type="module">
import tokenize from "../js/tokenize.js";
import parse from "../js/parse.js";
import slot from "../js/slot.js";

const end_of_line = "\n";

function escapify(text) {
    return "\"" + text.replace(/\\/g, "\\b").replace(/"/g, "\\q")  + "\"";
}

function compiler(tree) {
    if (Array.isArray(tree)) {
        return tree.join(end_of_line);
    }
    var indentation = 0;
    var output = [];

    function emit(token) {
        if (token === undefined) {
            emit(end_of_line);
            emit(" ".repeat(indentation));
        } else if (typeof token === "string") {
            output.push(token);
        } else if (Array.isArray(token)) {
            token.forEach(function (arg, arg_nr) {
                if (arg_nr !== 0) {
                    emit(" ");
                }
                return emit(arg);
            });
        } else if (token.kind === "text") {
            emit(escapify(token.text));
        } else if (token.kind === "number" || token.kind === "functino") {
            emit(token.text);
        } else {
            if (token.kind === "name") {
                emit(token.text);
                if (token.make === "endowment") {
                    emit("!");
                } else if (typeof token.function_nr === "number") {
                    emit("ƒ" + token.function_nr);
                }
            } else if (token.kind === "function") {
                emit("ƒ" + token.function_nr);
            } else if (token.kind === "array") {
                emit("[");
                emit(token.first);
                emit("]");
            } else if (token.kind === "record") {
                emit("{");
                token.first.forEach(function (field, field_nr) {
                    if (field_nr !== 0) {
                        emit(" ");
                    }
                    emit(escapify(field.first));
                    emit(": ");
                    emit(field.second);
                });
                emit("}");
            } else if (token.text === "[") {
                emit("(.");
                emit(" ");
                emit(token.first);
                emit(" ");
                emit(token.second);
                emit(")");
            } else if (token.text === "(") {
                emit("(");
                emit(token.first);
                if (token.second && token.second.length > 0) {
                    emit(" ");
                    emit(token.second)
                }
                emit(")");
            } else if (token.text === "then") {
                emit("(then ");
                emit(token.first);
                emit(" ");
                emit(token.second);
                emit(" ");
                emit(token.third);
                emit(")");
            } else if (token.kind === "operator") {
                emit("(");
                emit(token.text);
                emit(" ");
                emit(token.first);
                emit(" ");
                emit(token.second);
                emit(")");
            } else {
                emit(token.text);
                emit("????");;
            }
        }
    }

    function emit_statement(token) {
        emit();
        emit(token.text);
        if (token.label) {
            emit(" ");
            emit(token.label);
        }
        if (token.first) {
            emit(" ");
            if (token.push) {
                emit("[]");
            }
            emit(token.first);
            if (token.second) {
                emit(" ");
                if (token.pop) {
                    emit("[]");
                }
                emit(token.second);
                if (token.third) {
                    emit(" ");
                    emit(token.third);
                }
            }
        }
        if (token.statements) {
            emit_statements(token.statements);
            if (Array.isArray(token.elseif)) {
                token.elseif.forEach(function elseif(clause) {
                    emit();
                    emit("else if ");
                    emit(clause.first);
                    emit_statements(clause.statements)
                })
            }
            if (Array.isArray(token.else) && token.else.length > 0) {
                emit();
                emit("else");
                emit_statements(token.else)
            }
        }
    }

    function emit_statements(array) {
        indentation += 4;
        array.forEach(emit_statement);
        indentation -= 4;
    }

    emit(tree.misty);
    emit(" ");
    emit(tree.name);
    emit();
    tree.functions.forEach(function (func, function_nr) {
        emit("ƒ" + function_nr);
        emit(" ");
        if (func.name) {
            emit(func.name);
        }
        emit("(");
        emit(func.parameters);
        emit(")");
        emit_statements(func.statements);
        emit();
    });
    emit();
    return output.join("");
}

(function initialize() {
    const inputation = document.getElementById("inputation");
    const outputation = document.getElementById("outputation");
    const outputlegend = document.getElementById("outputlegend");
    const clear = document.getElementById("clear");
    const tokens = document.getElementById("tokens");
    const compile = document.getElementById("compile");
    const complete = document.getElementById("complete");
    const scope = document.getElementById("scope");
    const intrin = document.getElementById("intrin");
    const debug = document.getElementById("debugger");
    inputation.value = localStorage.getItem("source") || "misty program test() {\n}";
    inputation.addEventListener("input", function () {
        localStorage.setItem("source", inputation.value);
    });
    clear.addEventListener("click", function (event) {
        outputlegend.replaceChildren("Watch this space");
        outputation.innerHTML = "";
        inputation.value = "";
        inputation.focus();
    });
    tokens.addEventListener("click", function (event) {
        outputation.innerHTML = "";
        outputation.append(JSON.stringify(tokenize(inputation.value), [
            "error", "error_column", "error_row", "kind", "text",
            "at", "from_column", "from_row", "to_column", "to_row",
            "length", "indentation"
        ], 4));
        outputlegend.replaceChildren("Tokens");
        inputation.focus();
    }, false);
    compile.addEventListener("click", function (event) {
        outputlegend.replaceChildren("compile");
        outputation.innerHTML = "";
        outputation.append(compiler(parse(tokenize(inputation.value))));
        inputation.focus();
    }, false);
    complete.addEventListener("click", function (event) {
        outputation.innerHTML = "";
        outputation.append(
            JSON.stringify(
                slot(parse(tokenize(inputation.value))),
                null,
                4
            )
        );
        outputlegend.replaceChildren("Parse tree");
        inputation.focus();
    }, false);
    scope.addEventListener("click", function (event) {
        outputation.innerHTML = "";
        let tree = slot(parse(tokenize(inputation.value)));
        outputation.append(JSON.stringify((
            typeof tree === "object" && !Array.isArray(tree) && tree !== null
            ? tree.scopes
            : tree
        ), null, 4));
        outputlegend.replaceChildren("Scope");
        inputation.focus();
    }, false);
    intrin.addEventListener("click", function (event) {
        outputation.innerHTML = "";
        let tree = slot(parse(tokenize(inputation.value)));
        outputlegend.replaceChildren("Intrinsics");
        outputation.append(JSON.stringify((
            typeof tree === "object" && !Array.isArray(tree) && tree !== null
            ? tree.intrinsics
            : tree
        ), null, 4));
        inputation.focus();
    }, false);
    debug.addEventListener("click", function (event) {
        debugger;
    }, false);
    inputation.focus();
    inputation.select();
}());
</script>
</body>
</html>
